<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>

    <title>Sharifian.ai | AI Content Creator</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0b0b0f;
            color: white;
            text-align: center;
        }

        header {
            padding: 80px 20px;
        }

        h1 {
            font-size: 48px;
        }

        p {
            font-size: 20px;
            color: #ccc;
        }

        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 30px;
            background: #6c5ce7;

            text-decoration: none;
            border-radius: 30px;

        section {

<section>
    <div class="card">
        <h2>درباره من</h2>
        <p>
        تولیدکننده محتوا با تمرکز بر هوش مصنوعی،

        </p>
    </div>
</section>


<section id="portfolio">

        <h2>نمونه‌کارها</h2>

        به زودی پروژه‌های AI، تصاویر و ویدئوها اضافه می‌شوند.

<section>

</html>
